# Parameterized self-hosted runner pair, shared by every harness app.
#
#   dind    — a nested Docker daemon. The job's `services:` containers, any
#             `docker`/compose steps, etc. run here.
#   runner  — the Actions runner agent. It SHARES dind's network namespace
#             (network_mode: service:dind), so service ports published by dind are
#             reachable at localhost:<port> inside the runner — identical to a hosted
#             ubuntu-latest runner, so the app's ci.yml needs no changes.
#
# All app/stack specifics come from the environment (set by bin/ci-runner):
#   RUNNER_IMAGE   the per-stack image, e.g. harness-runner:rails
#   REPO_OWNER     GitHub repo owner   (e.g. d3vkit)
#   REPO_NAME      GitHub repo name    (e.g. kyra_api)
#   RUNNER_NAME    unique runner name  (e.g. kyra-mac-runner-1)
#   RUNNER_LABELS  e.g. self-hosted,linux,kyra
#   GITHUB_PAT     fine-grained PAT (Administration: read/write on the repo)
#
# Run N pairs in parallel: bin/ci-runner <app> up N  (one Compose project per pair).
name: harness-ci-runner

services:
  dind:
    image: docker:27-dind
    privileged: true            # required for a nested Docker daemon
    environment:
      DOCKER_TLS_CERTDIR: ""    # serve plain tcp://0.0.0.0:2375 (never published off-box)
    volumes:
      - dind-storage:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: always            # not unless-stopped — see the runner's note below (VEN-1306)
    # The runner borrows dind's netns (network_mode below) and its deregistration curl
    # goes out through it. Compose stops dependents first, so dind should still be up
    # while cleanup() runs — this is insurance, and it costs nothing when nothing hangs.
    stop_grace_period: 90s
    # Per-pair resource ceilings (see ci-runner/README.md → Sizing): bound each nested
    # Docker daemon so one runaway job can't consume the whole shared Docker VM and starve
    # co-tenant runner agents past their GitHub heartbeat → "lost communication". Rails-sized
    # defaults, generous enough not to clip a real job (dind hosts the job's `services:` —
    # for kyra that's the ~10-container supabase-parity stack); lighter stacks (expo/godot)
    # override via apps/<app>.env. These bound a single pair; they do NOT let two heavy pairs
    # share a 16 GB VM — for real concurrency, raise the VM's RAM or keep 1 pair per app.
    mem_limit: ${DIND_MEM:-5g}
    cpus: ${DIND_CPUS:-1.5}

  runner:
    image: ${RUNNER_IMAGE:?set RUNNER_IMAGE, e.g. harness-runner:rails (bin/ci-runner builds it)}
    init: true                  # reap zombie processes from job steps
    depends_on:
      dind:
        condition: service_healthy
    network_mode: "service:dind" # share dind's netns → services on localhost
    environment:
      DOCKER_HOST: tcp://localhost:2375
      GITHUB_PAT: ${GITHUB_PAT:-}  # required at run time (entrypoint validates); not needed for down/status
      REPO_OWNER: ${REPO_OWNER:?set REPO_OWNER}
      REPO_NAME: ${REPO_NAME:?set REPO_NAME}
      RUNNER_NAME: ${RUNNER_NAME:?set RUNNER_NAME}
      RUNNER_LABELS: ${RUNNER_LABELS:?set RUNNER_LABELS}
      # Registration mode, per app. DEFAULT 1 = --ephemeral: exactly what every app does
      # today. An app opts out in apps/<app>.env; nothing else changes for anyone else.
      RUNNER_EPHEMERAL: ${RUNNER_EPHEMERAL:-1}
      # `report` | `full`. Gates only the DESTRUCTIVE part of the per-job hook (inert when
      # RUNNER_EPHEMERAL=1). Start a newly-opted-in app at `report`, read one job log to
      # confirm the hook runs before "Initialize containers", then flip to `full`.
      # Doubles as a kill-switch that needs no image rebuild.
      CI_RUNNER_SCRUB_MODE: ${CI_RUNNER_SCRUB_MODE:-full}
      # ACTIONS_RUNNER_HOOK_JOB_STARTED is deliberately NOT set here. entrypoint.sh exports
      # it, so the hook path and the hook script always version together — set from compose
      # against an older image, the runner cannot find the hook and FAILS EVERY JOB.
    # `always` rather than `unless-stopped` so a pair stopped by hand returns once the
    # daemon is back — nobody should have to remember to restart CI. Under
    # RUNNER_EPHEMERAL=1 the restart is also what re-registers the runner; under 0 it is
    # crash recovery only. `bin/ci-runner <app> down` removes the containers outright, so
    # pausing a pair is unaffected by this. (VEN-1306)
    restart: always
    # Deregistration is not free under RUNNER_EPHEMERAL=0: entrypoint.sh must forward
    # SIGTERM to run.sh, wait for the listener, then make two GitHub round-trips. The 10s
    # default would SIGKILL that mid-flight and strand the registration on every stop.
    stop_grace_period: 60s
    mem_limit: ${RUNNER_MEM:-4g}  # runs rspec + Chromium system specs; a cgroup ceiling stops one
    cpus: ${RUNNER_CPUS:-2.5}     # leaky/runaway job from swamping the VM and stalling other runners
    volumes:
      # Persistent per-pair gem cache. Inert unless the app's ci.yml points BUNDLE_PATH
      # here (kyra does); a warm bundle then makes `bundle install` a fast incremental
      # no-op across ephemeral jobs instead of a network cache round-trip every run.
      - bundle-cache:/home/runner/.bundle-cache

volumes:
  dind-storage:
  bundle-cache:
